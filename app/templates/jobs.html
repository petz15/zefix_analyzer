{% extends "base.html" %}

{% block extra_head %}
{% if has_active %}
<script>
(function () {
  var evtSource = new EventSource({{ request.url_for('ui_jobs_stream') | tojson }});
  var jobsPartialUrl = {{ request.url_for('ui_jobs_partial') | tojson }};
  evtSource.onmessage = function (e) {
    if (e.data === "done") { evtSource.close(); return; }
    fetch(jobsPartialUrl)
      .then(function (r) { return r.text(); })
      .then(function (html) {
        var container = document.getElementById("jobs-table-container");
        if (container) container.innerHTML = html;
      });
  };
  evtSource.onerror = function () { evtSource.close(); };
})();
</script>
{% endif %}
{% endblock %}

{% block content %}
<section class="card">
  <div class="stack-header">
    <h2 style="margin:0;">Background Jobs</h2>
    <a class="button-link secondary" href="{{ request.url_for('ui_collection') }}">Start jobs</a>
  </div>

  <div id="jobs-table-container">
    {% include "jobs_table.html" %}
  </div>
</section>
{% endblock %}
