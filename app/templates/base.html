<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zefix Analyzer</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="/ui">Zefix Analyzer</a>
      <p class="subtitle">GUI mode: Zefix + Google Search driven company research</p>
    </div>
  </header>

  <main class="container">
    {% if message %}
      <div class="alert success">{{ message }}</div>
    {% endif %}
    {% if error %}
      <div class="alert error">{{ error }}</div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
