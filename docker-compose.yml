services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-zefix_analyzer}
      ZEFIX_API_BASE_URL: ${ZEFIX_API_BASE_URL:-https://www.zefix.admin.ch/ZefixPublicREST/api/v1}
      ZEFIX_API_USERNAME: ${ZEFIX_API_USERNAME:-}
      ZEFIX_API_PASSWORD: ${ZEFIX_API_PASSWORD:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      GOOGLE_DAILY_QUOTA: ${GOOGLE_DAILY_QUOTA:-83}
      GOOGLE_SEARCH_ENABLED: ${GOOGLE_SEARCH_ENABLED:-true}
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  collector:
    build: .
    profiles: ["collector"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-zefix_analyzer}
      ZEFIX_API_BASE_URL: ${ZEFIX_API_BASE_URL:-https://www.zefix.admin.ch/ZefixPublicREST/api/v1}
      ZEFIX_API_USERNAME: ${ZEFIX_API_USERNAME:-}
      ZEFIX_API_PASSWORD: ${ZEFIX_API_PASSWORD:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      GOOGLE_DAILY_QUOTA: ${GOOGLE_DAILY_QUOTA:-83}
      GOOGLE_SEARCH_ENABLED: ${GOOGLE_SEARCH_ENABLED:-true}
    # Override with: docker compose --profile collector run --rm collector python -m app.run_collector bulk
    command: python -m app.run_collector batch --limit 100
