services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zefix
      POSTGRES_PASSWORD: zefix
      POSTGRES_DB: zefix_analyzer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://zefix:zefix@db:5432/zefix_analyzer
      ZEFIX_API_BASE_URL: https://www.zefix.admin.ch/ZefixREST/api/v1
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_CSE_ID: ${GOOGLE_CSE_ID:-}
    depends_on:
      - db
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
